services:
  fix-phone:
    image: ghcr.io/kohaku743/fix-phone:latest
    ports:
      - "3000:3000"
    volumes:
      - db-data:/app/backend/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/backend/data/phone_repair.db
      # REQUIRED – change before deploying
      - ADMIN_PASSWORD=changeme
      # REQUIRED – use a long random string: openssl rand -hex 32
      - JWT_SECRET=change-this-to-a-long-random-secret

volumes:
  db-data:
