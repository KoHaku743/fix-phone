services:
  fix-phone:
    image: ghcr.io/kohaku743/fix-phone:latest
    # Load all variables from your .env file (copy .env.example → .env first)
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
      # Uncomment if ADMIN_PORT is set in .env to expose the admin panel on a
      # separate port (e.g. ADMIN_PORT=3001):
      # - "${ADMIN_PORT:-3001}:${ADMIN_PORT:-3001}"
    volumes:
      - db-data:/app/backend/data
    restart: unless-stopped
    # Docker-specific overrides – these take precedence over .env values
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/backend/data/phone_repair.db

volumes:
  db-data:
