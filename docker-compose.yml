services:
  fix-phone:
    image: ghcr.io/kohaku743/fix-phone:latest
    ports:
      - "3000:3000"
    volumes:
      - db-data:/app/backend/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/backend/data/phone_repair.db
      # REQUIRED – change before deploying (owner password)
      - ADMIN_PASSWORD=changeme
      # Optional – enable second staff account (remove or leave blank to disable)
      # - STAFF_PASSWORD=changeme2
      # Optional – display names on login screen
      # - OWNER_NAME=Owner
      # - STAFF_NAME=Staff
      # Optional – shop address shown in confirmation emails with a Google Maps link
      # - SHOP_ADDRESS=Mlynská 1, 010 01 Žilina, Slovakia
      # REQUIRED – use a long random string: openssl rand -hex 32
      - JWT_SECRET=change-this-to-a-long-random-secret

volumes:
  db-data:
