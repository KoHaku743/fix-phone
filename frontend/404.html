<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Page Not Found · FixPhone</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>" />
  <style>
    :root {
      --bg: #0a0e1a;
      --teal: #00d4ff;
      --text: #e8eaf0;
      --muted: #8892a4;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 800;
      background: linear-gradient(135deg, #00d4ff, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .icon { font-size: 3rem; margin: 1rem 0; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p  { color: var(--muted); margin-bottom: 2rem; max-width: 380px; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #00d4ff, #0090c8);
      color: #000;
      font-weight: 700;
      padding: 0.75rem 2rem;
      border-radius: 50px;
      text-decoration: none;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <div class="icon">🔧</div>
  <h1>Page Not Found</h1>
  <p>Looks like this page needs a repair too. Let's get you back on track.</p>
  <a class="btn" href="/">← Back to Home</a>
</body>
</html>
